<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111111">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="모자이크">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>모자이크 편집기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root{--bg:#111;--surface:#1a1a1a;--surface2:#222;--border:#333;--text:#f0f0f0;--muted:#888;--accent:#ff6b35;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
#splash{position:fixed;inset:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;transition:opacity 0.4s ease;}
#splash.hide{opacity:0;pointer-events:none;}
.splash-emoji{font-size:64px;animation:pop 0.4s ease;}
.splash-title{font-size:20px;font-weight:700;color:#f0f0f0;text-align:center;line-height:1.6;}
.splash-sub{font-size:15px;color:#ff6b35;font-weight:700;text-align:center;}
@keyframes pop{0%{transform:scale(0.5);opacity:0;}70%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
header{padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{font-size:18px;font-weight:700;letter-spacing:-0.5px;}
.logo span{color:var(--accent);}
.header-btns{display:flex;gap:6px;}
.icon-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;transition:background 0.15s;}
.icon-btn:active{background:var(--border);}
.icon-btn:disabled{opacity:0.3;cursor:default;}
.toolbar{padding:8px 10px;display:flex;flex-direction:column;gap:7px;border-bottom:1px solid var(--border);flex-shrink:0;}
.trow{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.trow-label{font-size:10px;color:var(--muted);min-width:32px;letter-spacing:0.3px;flex-shrink:0;}
.tool-group{display:flex;gap:3px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:3px;flex-wrap:wrap;}
.tbtn{padding:5px 10px;font-size:12px;font-weight:500;border:none;border-radius:7px;background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;font-family:inherit;white-space:nowrap;}
.tbtn.on{background:var(--accent);color:#fff;}
.tbtn:active{opacity:0.7;}
.slider-wrap{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:5px 10px;}
.slider-wrap label{font-size:11px;color:var(--muted);}
.sz-btn{background:var(--border);border:none;color:var(--text);width:24px;height:24px;border-radius:6px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;}
.sz-btn:active{background:var(--muted);}
#sz{width:60px;accent-color:var(--accent);}
#sz-val{font-size:12px;font-weight:500;min-width:22px;color:var(--accent);}
#brush-size-row{display:flex;}
#shape-picker{display:none;gap:3px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:3px;}
.canvas-area{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative;}
#drop-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;width:100%;height:100%;cursor:pointer;}
.drop-icon{font-size:56px;}
.drop-title{font-size:18px;font-weight:700;}
.drop-sub{font-size:13px;color:var(--muted);}
.upload-btn{background:var(--accent);color:#fff;border:none;padding:12px 28px;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;}
.upload-btn:active{opacity:0.8;}
#canvas-wrap{display:none;width:100%;height:100%;align-items:center;justify-content:center;position:relative;}
.cv-stack{position:relative;display:inline-block;}
canvas{max-width:100%;max-height:100%;object-fit:contain;display:block;}
#mc{touch-action:none;cursor:crosshair;}
#ov{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.act-btn{padding:7px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;white-space:nowrap;}
.act-btn:active{background:var(--border);}
.act-btn.save{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700;}
.act-btn.save:active{opacity:0.8;}
#action-row{display:none;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.modal-bg.show{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px 20px;width:280px;text-align:center;transform:scale(0.9);transition:transform 0.2s;}
.modal-bg.show .modal{transform:scale(1);}
.modal-title{font-size:16px;font-weight:700;margin-bottom:8px;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5;}
.modal-btns{display:flex;gap:8px;}
.modal-no{flex:1;padding:11px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;}
.modal-yes{flex:1;padding:11px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;}
.modal-no:active{background:var(--border);}
.modal-yes:active{opacity:0.8;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#fff;color:#111;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;z-index:99;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-emoji">📱</div>
  <div class="splash-title">아이폰은<br>블러, 모자이크<br>개불편해서</div>
  <div class="splash-sub">직접만든 앱</div>
</div>

<header>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="logo">모<span>자</span>이크</div>
    <button class="icon-btn" id="btn-reset" onclick="resetCanvas()" title="원본으로" style="display:none;font-size:13px;width:auto;padding:0 10px;">원본</button>
  </div>
  <div class="header-btns">
    <button class="icon-btn" id="btn-undo" onclick="undoLast()" title="실행취소" disabled>↩</button>
    <button class="icon-btn" id="btn-redo" onclick="redoNext()" title="재실행" disabled>↪</button>
    <button class="icon-btn" onclick="document.getElementById('file-input').click()" title="새 사진">＋</button>
    <button class="icon-btn save-icon" id="btn-save" onclick="dl()" title="저장" style="display:none;background:var(--accent);border-color:var(--accent);color:#fff;font-size:13px;width:auto;padding:0 14px;font-weight:700;">💾 저장</button>
  </div>
</header>

<div class="toolbar" id="toolbar" style="display:none;">
  <div class="trow">
    <span class="trow-label">개체</span>
    <div class="tool-group">
      <button class="tbtn on" id="btn-brush" onclick="setTool('brush')">🖌 브러시</button>
      <button class="tbtn" id="btn-box" onclick="setTool('box')">⬜ 박스</button>
      <button class="tbtn" id="btn-shape" onclick="setTool('shape')">⭕ 도형</button>
    </div>
    <div id="shape-picker">
      <button class="tbtn on" id="sh-circle" onclick="setShape('circle')">○ 원</button>
      <button class="tbtn" id="sh-rect" onclick="setShape('rect')">□ 사각</button>
      <button class="tbtn" id="sh-ellipse" onclick="setShape('ellipse')">⬭ 타원</button>
    </div>
  </div>
  <div class="trow" id="brush-size-row">
    <span class="trow-label">크기</span>
    <div class="tool-group">
      <button class="tbtn" id="bs-s" onclick="setBrushSize(15)"><span class="bdot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:currentColor;margin-right:4px;vertical-align:middle;"></span>S</button>
      <button class="tbtn on" id="bs-m" onclick="setBrushSize(30)"><span class="bdot" style="display:inline-block;width:12px;height:12px;border-radius:50%;background:currentColor;margin-right:4px;vertical-align:middle;"></span>M</button>
      <button class="tbtn" id="bs-l" onclick="setBrushSize(50)"><span class="bdot" style="display:inline-block;width:17px;height:17px;border-radius:50%;background:currentColor;margin-right:4px;vertical-align:middle;"></span>L</button>
      <button class="tbtn" id="bs-xl" onclick="setBrushSize(70)"><span class="bdot" style="display:inline-block;width:22px;height:22px;border-radius:50%;background:currentColor;margin-right:4px;vertical-align:middle;"></span>XL</button>
    </div>
  </div>
  <div class="trow">
    <span class="trow-label">효과</span>
    <div class="tool-group">
      <button class="tbtn on" id="btn-mosaic" onclick="setEffect('mosaic')">모자이크</button>
      <button class="tbtn" id="btn-blur" onclick="setEffect('blur')">블러</button>
    </div>
    <div class="slider-wrap">
      <label>세기</label>
      <button class="sz-btn" onclick="changeSz(-1)">－</button>
      <input type="range" id="sz" min="4" max="40" value="15" step="1" oninput="document.getElementById('sz-val').textContent=this.value">
      <button class="sz-btn" onclick="changeSz(1)">＋</button>
      <span id="sz-val">15</span>
    </div>
  </div>
</div>

<div class="canvas-area">
  <div id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="drop-icon">🖼️</div>
    <div class="drop-title">사진 선택</div>
    <div class="drop-sub">탭해서 갤러리에서 불러오기</div>
    <button class="upload-btn">사진 불러오기</button>
  </div>
  <div id="canvas-wrap">
    <div class="cv-stack">
      <canvas id="mc"
        ontouchstart="sd(event)" ontouchmove="om(event)" ontouchend="ed(event)"
        onmousedown="sd(event)" onmousemove="om(event)" onmouseup="ed(event)"
        onmouseleave="ed(event);octx&&octx.clearRect(0,0,ov.width,ov.height)">
      </canvas>
      <canvas id="ov"></canvas>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-title">작업 초기화</div>
    <div class="modal-sub">지금까지 작업한 내용이<br>모두 사라져요. 계속할까요?</div>
    <div class="modal-btns">
      <button class="modal-no" onclick="closeModal()">아니오</button>
      <button class="modal-yes" onclick="confirmClear()">예</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file-input" accept="image/*" style="display:none" onchange="loadF(this.files[0])">

<script>
let cv,ctx,ov,octx,origData,hist=[],redoHist=[],tool='brush',effect='mosaic',shape='circle',drawing=false,startPt=null,brushR=30,strokeSnap=null;

function setTool(t){
  tool=t;
  ['brush','box','shape'].forEach(x=>document.getElementById('btn-'+x).classList.toggle('on',x===t));
  document.getElementById('shape-picker').style.display=t==='shape'?'flex':'none';
  document.getElementById('brush-size-row').style.display=t==='brush'?'flex':'none';
}
function setBrushSize(v){
  brushR=v;
  ['s','m','l','xl'].forEach(x=>document.getElementById('bs-'+x).classList.remove('on'));
  const map={15:'s',30:'m',50:'l',70:'xl'};
  if(map[v])document.getElementById('bs-'+map[v]).classList.add('on');
}
function setShape(s){
  shape=s;
  ['circle','rect','ellipse'].forEach(x=>document.getElementById('sh-'+x).classList.toggle('on',x===s));
}
function setEffect(e){
  effect=e;
  document.getElementById('btn-mosaic').classList.toggle('on',e==='mosaic');
  document.getElementById('btn-blur').classList.toggle('on',e==='blur');
}
function changeSz(d){
  const s=document.getElementById('sz');
  s.value=Math.min(40,Math.max(4,parseInt(s.value)+d));
  document.getElementById('sz-val').textContent=s.value;
}
function loadF(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{const img=new Image();img.onload=()=>setup(img);img.src=ev.target.result;};
  r.readAsDataURL(file);
}

let origImg=null;

function setup(img){
  origImg=img;
  cv=document.getElementById('mc');
  ov=document.getElementById('ov');
  const area=document.querySelector('.canvas-area');
  const scale=Math.min(area.clientWidth/img.width,area.clientHeight/img.height,1);
  cv.width=Math.round(img.width*scale);
  cv.height=Math.round(img.height*scale);
  ov.width=cv.width;ov.height=cv.height;
  ctx=cv.getContext('2d');
  octx=ov.getContext('2d');
  ctx.drawImage(img,0,0,cv.width,cv.height);
  origData=ctx.getImageData(0,0,cv.width,cv.height);
  hist=[ctx.getImageData(0,0,cv.width,cv.height)];
  redoHist=[];
  document.getElementById('drop-zone').style.display='none';
  document.getElementById('canvas-wrap').style.display='flex';
  document.getElementById('toolbar').style.display='flex';
  document.getElementById('btn-save').style.display='flex';
  document.getElementById('btn-reset').style.display='flex';
  updateUR();
  showToast('편집 준비 완료!');
}
function gp(e){
  const rect=cv.getBoundingClientRect();
  const sx=cv.width/rect.width,sy=cv.height/rect.height;
  const src=e.touches?e.touches[0]:e;
  return{x:Math.round((src.clientX-rect.left)*sx),y:Math.round((src.clientY-rect.top)*sy)};
}
function sd(e){
  e.preventDefault();drawing=true;startPt=gp(e);
  if(tool==='brush'){
    saveH();
    strokeSnap=ctx.getImageData(0,0,cv.width,cv.height);
    applyBrush(startPt);
  }
}
function om(e){
  e.preventDefault();
  const p=gp(e);
  if(tool==='brush'){
    drawBrushCursor(p);
    if(drawing)applyBrush(p);
  } else if(drawing&&startPt){
    octx.clearRect(0,0,ov.width,ov.height);
    drawPreview(octx,startPt,p);
  }
}
function ed(e){
  if(!drawing)return;drawing=false;
  octx.clearRect(0,0,ov.width,ov.height);
  if(tool==='brush'){
    // 획 끝나면 현재 상태로 히스토리 최상단 갱신
    if(hist.length>0)hist[hist.length-1]=ctx.getImageData(0,0,cv.width,cv.height);
    strokeSnap=null;
    updateUR();
  } else if((tool==='box'||tool==='shape')&&startPt){
    const src=e.changedTouches?e.changedTouches[0]:e;
    const p=gp({clientX:src.clientX,clientY:src.clientY});
    saveH();
    tool==='box'?applyBox(startPt,p):applyShape(startPt,p);
    startPt=null;
  }
}

function drawBrushCursor(p){
  const r=brushR;
  octx.clearRect(0,0,ov.width,ov.height);
  octx.save();
  octx.beginPath();
  octx.arc(p.x,p.y,r,0,Math.PI*2);
  octx.strokeStyle='rgba(255,107,53,0.9)';
  octx.lineWidth=2;
  octx.setLineDash([4,3]);
  octx.stroke();
  octx.restore();
}
function applyBrush(p){
  const sz=parseInt(document.getElementById('sz').value);
  const r=brushR;
  const x0=Math.max(0,p.x-r),y0=Math.max(0,p.y-r);
  const w=Math.min(r*2,cv.width-x0),h=Math.min(r*2,cv.height-y0);
  if(w<=0||h<=0)return;
  // 획 시작 스냅샷 기반으로 효과 계산 (덧칠 누적 방지)
  const base=strokeSnap||ctx.getImageData(0,0,cv.width,cv.height);
  const tmp=document.createElement('canvas');
  tmp.width=cv.width;tmp.height=cv.height;
  const tc=tmp.getContext('2d');
  tc.putImageData(base,0,0);
  applyFX(tc,x0,y0,w,h,sz);
  ctx.save();
  ctx.beginPath();
  ctx.arc(p.x,p.y,r,0,Math.PI*2);
  ctx.clip();
  ctx.drawImage(tmp,0,0);
  ctx.restore();
}
function applyBox(a,b){
  const x0=Math.max(0,Math.min(a.x,b.x)),y0=Math.max(0,Math.min(a.y,b.y));
  const w=Math.min(Math.abs(b.x-a.x),cv.width-x0),h=Math.min(Math.abs(b.y-a.y),cv.height-y0);
  if(w>2&&h>2)applyFX(ctx,x0,y0,w,h,parseInt(document.getElementById('sz').value));
}
function applyShape(a,b){
  const sz=parseInt(document.getElementById('sz').value);
  const cx=(a.x+b.x)/2,cy=(a.y+b.y)/2,rx=Math.abs(b.x-a.x)/2,ry=Math.abs(b.y-a.y)/2;
  if(rx<2||ry<2)return;
  const x0=Math.max(0,Math.floor(cx-rx)),y0=Math.max(0,Math.floor(cy-ry));
  const w=Math.min(Math.ceil(rx*2),cv.width-x0),h=Math.min(Math.ceil(ry*2),cv.height-y0);
  // 효과 적용된 임시 캔버스
  const tmp=document.createElement('canvas');
  tmp.width=cv.width;tmp.height=cv.height;
  const tc=tmp.getContext('2d');
  tc.drawImage(cv,0,0);
  applyFX(tc,x0,y0,w,h,sz);
  // 도형 모양으로 클립 후 drawImage로 합성 (putImageData는 clip 무시됨)
  ctx.save();
  ctx.beginPath();
  if(shape==='circle'){ctx.arc(cx,cy,Math.min(rx,ry),0,Math.PI*2);}
  else if(shape==='rect'){ctx.rect(x0,y0,w,h);}
  else{ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);}
  ctx.clip();
  ctx.drawImage(tmp,0,0);
  ctx.restore();
}
function drawPreview(c,a,b){
  c.save();c.strokeStyle='rgba(255,107,53,0.9)';c.lineWidth=2;c.setLineDash([5,4]);
  const cx=(a.x+b.x)/2,cy=(a.y+b.y)/2,rx=Math.abs(b.x-a.x)/2,ry=Math.abs(b.y-a.y)/2;
  c.beginPath();
  if(tool==='box'){c.strokeRect(Math.min(a.x,b.x),Math.min(a.y,b.y),Math.abs(b.x-a.x),Math.abs(b.y-a.y));}
  else if(shape==='circle'){c.arc(cx,cy,Math.min(rx,ry),0,Math.PI*2);c.stroke();}
  else if(shape==='rect'){c.strokeRect(Math.min(a.x,b.x),Math.min(a.y,b.y),Math.abs(b.x-a.x),Math.abs(b.y-a.y));}
  else{c.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);c.stroke();}
  c.restore();
}
function applyFX(c,x0,y0,w,h,sz){
  effect==='mosaic'?applyMosaic(c,x0,y0,w,h,sz):applyBlur(c,x0,y0,w,h,sz);
}
function applyMosaic(c,x0,y0,w,h,sz){
  const px=Math.max(4,sz),data=c.getImageData(x0,y0,w,h),d=data.data;
  for(let y=0;y<h;y+=px)for(let x=0;x<w;x+=px){
    let r=0,g=0,b=0,cnt=0;
    for(let dy=0;dy<px&&y+dy<h;dy++)for(let dx=0;dx<px&&x+dx<w;dx++){
      const i=((y+dy)*w+(x+dx))*4;r+=d[i];g+=d[i+1];b+=d[i+2];cnt++;
    }
    r=Math.round(r/cnt);g=Math.round(g/cnt);b=Math.round(b/cnt);
    for(let dy=0;dy<px&&y+dy<h;dy++)for(let dx=0;dx<px&&x+dx<w;dx++){
      const i=((y+dy)*w+(x+dx))*4;d[i]=r;d[i+1]=g;d[i+2]=b;
    }
  }
  c.putImageData(data,x0,y0);
}
function applyBlur(c,x0,y0,w,h,sz){
  const rad=Math.max(2,Math.round(sz/2));
  const src=c.getImageData(x0,y0,w,h),dst=c.createImageData(w,h);
  const s=src.data,d=dst.data;
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    let r=0,g=0,b=0,cnt=0;
    for(let dy=-rad;dy<=rad;dy++)for(let dx=-rad;dx<=rad;dx++){
      const nx=x+dx,ny=y+dy;
      if(nx>=0&&nx<w&&ny>=0&&ny<h){const i=(ny*w+nx)*4;r+=s[i];g+=s[i+1];b+=s[i+2];cnt++;}
    }
    const oi=(y*w+x)*4;d[oi]=Math.round(r/cnt);d[oi+1]=Math.round(g/cnt);d[oi+2]=Math.round(b/cnt);d[oi+3]=s[oi+3];
  }
  c.putImageData(dst,x0,y0);
}
function saveH(){
  hist.push(ctx.getImageData(0,0,cv.width,cv.height));
  if(hist.length>30)hist.shift();
  redoHist=[];updateUR();
}
function undoLast(){
  if(!cv||hist.length<=1)return;
  redoHist.push(hist.pop());
  ctx.putImageData(hist[hist.length-1],0,0);
  updateUR();showToast('실행 취소');
}
function redoNext(){
  if(!cv||!redoHist.length)return;
  const state=redoHist.pop();
  hist.push(state);
  ctx.putImageData(state,0,0);
  updateUR();showToast('재실행');
}
function updateUR(){
  document.getElementById('btn-undo').disabled=hist.length<=1;
  document.getElementById('btn-redo').disabled=redoHist.length===0;
}
function clearWork(){
  document.getElementById('modal-bg').classList.add('show');
}
function closeModal(){
  document.getElementById('modal-bg').classList.remove('show');
}
function confirmClear(){
  closeModal();
  if(!origData)return;
  ctx.putImageData(origData,0,0);
  hist=[ctx.getImageData(0,0,cv.width,cv.height)];
  redoHist=[];updateUR();showToast('작업 초기화 완료');
}
function resetCanvas(){
  if(!origData||!cv)return;
  saveH();
  ctx.putImageData(origData,0,0);
  showToast('원본으로 복원');
}
function dl(){
  if(!cv||!origImg)return;
  const scaleX=origImg.width/cv.width;
  const scaleY=origImg.height/cv.height;
  // 원본 해상도 캔버스 생성
  const out=document.createElement('canvas');
  out.width=origImg.width;
  out.height=origImg.height;
  const octx2=out.getContext('2d');
  // 원본 이미지 먼저 그리기
  octx2.drawImage(origImg,0,0);
  // 편집된 캔버스를 원본 사이즈로 업스케일해서 덮어씌우기
  octx2.drawImage(cv,0,0,origImg.width,origImg.height);
  out.toBlob(blob=>{
    const a=document.createElement('a');
    a.download='mosaic_'+Date.now()+'.jpg';
    a.href=URL.createObjectURL(blob);a.click();
    showToast('저장 완료!');
  },'image/jpeg',0.97);
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
setTimeout(()=>{
  const s=document.getElementById('splash');
  s.classList.add('hide');
  setTimeout(()=>s.remove(),400);
},3000);
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
